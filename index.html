```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メロン管理あ</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
body {
  font-family: sans-serif;
  padding: 15px;
  background: #f5fff5;
}

h1 {
  text-align: center;
}

.box {
  background: #ffffff;
  padding: 15px;
  margin: 10px 0;
  border-radius: 12px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

input {
  font-size: 18px;
  padding: 8px;
  width: 100%;
  margin-top: 8px;
}

.result {
  font-size: 20px;
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>🍈 メロン交配管理</h1>

<div class="box">
  <h2>ハウス①</h2>
  <input type="date" id="date1">
  <div class="result" id="result1"></div>
</div>

<div class="box">
  <h2>ハウス②</h2>
  <input type="date" id="date2">
  <div class="result" id="result2"></div>
</div>

<div class="box">
  <h2>ハウス③</h2>
  <input type="date" id="date3">
  <div class="result" id="result3"></div>
</div>

<script>
function calcDays(dateId, resultId, storageKey) {
  const input = document.getElementById(dateId);
  const result = document.getElementById(resultId);

  // 保存データ読み込み
  const savedDate = localStorage.getItem(storageKey);
  if (savedDate) {
    input.value = savedDate;
    showDays(savedDate, result);
  }

  // 入力時処理
  input.addEventListener("change", () => {
    const value = input.value;

    // 保存
    localStorage.setItem(storageKey, value);

    // 表示
    showDays(value, result);
  });
}

// 日数計算
function showDays(dateValue, result) {
  const selectedDate = new Date(dateValue);
  const today = new Date();

  const diffTime = today - selectedDate;
  const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

  if (diffDays >= 0) {
    result.textContent = "今日で " + diffDays + " 日目";
  } else {
    result.textContent = "未来の日付です";
  }
}

// 各ハウス
calcDays("date1", "result1", "house1");
calcDays("date2", "result2", "house2");
calcDays("date3", "result3", "house3");
</script>

</body>
</html>
