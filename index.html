<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メロン管理</title>

<style>
body{
    font-family:sans-serif;
    margin:0;
    background:#f5f7f3;
    text-align:center;
}

h1{
    margin:15px 0;
    color:#4c6b3c;
}

/* タブ */
.tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:15px;
}

.tab{
    padding:10px 18px;
    border-radius:20px;
    border:none;
    background:#dfe5d8;
    font-weight:bold;
    cursor:pointer;
}

.tab.active{
    background:#6aa84f;
    color:white;
}

/* カード */
.card{
    background:white;
    margin:10px;
    padding:15px;
    border-radius:15px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
    text-align:left;
}

.house{
    font-weight:bold;
    margin-bottom:10px;
}

.item{
    display:flex;
    justify-content:space-between;
    margin:5px 0;
}

.badge{
    padding:3px 10px;
    border-radius:10px;
    font-size:12px;
}

.red{background:#f8d7da;}
.orange{background:#ffe5b4;}
.green{background:#d4edda;}
</style>
</head>

<body>

<h1>🌱 メロン管理</h1>

<!-- タブ -->
<div class="tabs">
<button class="tab active" onclick="switchTab('today')">今日やること</button>
<button class="tab" onclick="switchTab('category')">分類</button>
<button class="tab" onclick="switchTab('timeline')">時系列</button>
</div>

<!-- 表示エリア -->
<div id="content"></div>

<script>

// ===== 日付保存 =====
function saveDate(house){
    const val = document.getElementById("date"+house).value;
    localStorage.setItem("house"+house, val);
    render();
}

// ===== 日数計算 =====
function getDays(date){
    if(!date) return null;
    const start = new Date(date);
    const today = new Date();
    const diff = (today - start) / (1000*60*60*24);
    return Math.floor(diff);
}

// ===== 今日やること生成 =====
function getTasks(days){
    if(days == null) return [];

    let tasks=[];

    if(days <=14) tasks.push(["30℃管理","orange"]);
    if(days >=14 && days <=19) tasks.push(["硬化期","orange"]);
    if(days >=19 && days <=45) tasks.push(["通常管理","green"]);
    if(days >=45) tasks.push(["仕上げ期","red"]);

    if(days >=4 && days <=15) tasks.push(["多潅水","green"]);
    if(days >=15 && days <=30) tasks.push(["潅水控え","orange"]);
    if(days >=30 && days <=45) tasks.push(["少量多潅水","green"]);
    if(days >=45) tasks.push(["水切り","red"]);

    if(days >=53 && days <60) tasks.push(["収穫準備","orange"]);
    if(days >=60) tasks.push(["収穫","red"]);

    return tasks;
}

// ===== 描画 =====
function render(){
    const content = document.getElementById("content");
    content.innerHTML="";

    for(let i=1;i<=3;i++){
        const date = localStorage.getItem("house"+i);
        const days = getDays(date);

        const card = document.createElement("div");
        card.className="card";

        let html = `
        <div class="house">ハウス${i}</div>
        <input type="date" id="date${i}" value="${date||""}" onchange="saveDate(${i})">
        <div>交配後：${days!==null ? days+"日" : "-"}</div>
        `;

        const tasks = getTasks(days);

        tasks.forEach(t=>{
            html += `
            <div class="item">
                <div>${t[0]}</div>
                <div class="badge ${t[1]}">${t[0]}</div>
            </div>`;
        });

        card.innerHTML = html;
        content.appendChild(card);
    }
}

// ===== タブ切り替え =====
function switchTab(mode){
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    event.target.classList.add("active");

    if(mode === "today"){
        render();
    }

    if(mode === "category"){
        document.getElementById("content").innerHTML =
        "<div class='card'>分類表示（ここは後で強化できる）</div>";
    }

    if(mode === "timeline"){
        document.getElementById("content").innerHTML =
        "<div class='card'>時系列表示（ここも後で強化）</div>";
    }
}

// 初期表示
render();

</script>

</body>
</html>
