```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メロン管理アプリ</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
body {
  font-family: sans-serif;
  padding: 15px;
  background: #f5fff5;
}

h1 {
  text-align: center;
}

.box {
  background: #ffffff;
  padding: 15px;
  margin: 12px 0;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

input {
  font-size: 18px;
  padding: 8px;
  width: 100%;
  margin-top: 8px;
}

.result {
  font-size: 20px;
  margin-top: 10px;
  font-weight: bold;
}

.schedule {
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
  background: #e8f5e9;
  font-size: 16px;
}
</style>
</head>

<body>

<h1>🍈 メロン交配管理</h1>

<div class="box">
  <h2>ハウス①</h2>
  <input type="date" id="date1">
  <div class="result" id="result1"></div>
  <div class="schedule" id="schedule1"></div>
</div>

<div class="box">
  <h2>ハウス②</h2>
  <input type="date" id="date2">
  <div class="result" id="result2"></div>
  <div class="schedule" id="schedule2"></div>
</div>

<div class="box">
  <h2>ハウス③</h2>
  <input type="date" id="date3">
  <div class="result" id="result3"></div>
  <div class="schedule" id="schedule3"></div>
</div>

<script>
// 日数＋スケジュール表示
function calcDays(dateId, resultId, scheduleId, storageKey) {
  const input = document.getElementById(dateId);
  const result = document.getElementById(resultId);
  const schedule = document.getElementById(scheduleId);

  // 保存データ読み込み
  const savedDate = localStorage.getItem(storageKey);
  if (savedDate) {
    input.value = savedDate;
    updateAll(savedDate);
  }

  input.addEventListener("change", () => {
    const value = input.value;
    localStorage.setItem(storageKey, value);
    updateAll(value);
  });

  function updateAll(dateValue) {
    const selectedDate = new Date(dateValue);
    const today = new Date();

    const diffTime = today - selectedDate;
    const days = Math.floor(diffTime / (1000 * 60 * 60 * 24));

    if (days >= 0) {
      result.textContent = "今日で " + days + " 日目";
      schedule.innerHTML = getSchedule(days);
    } else {
      result.textContent = "未来の日付です";
      schedule.innerHTML = "";
    }
  }
}

// スケジュール内容（ここが肝）
function getSchedule(days) {

  if (days <= 7) {
    return "🌱 活着期<br>・潅水：控えめ<br>・草勢確保";
  }

  if (days <= 15) {
    return "🌿 初期肥大<br>・潅水：やや増やす<br>・葉面積確保";
  }

  if (days <= 30) {
    return "🍈 肥大期<br>・潅水：しっかり<br>・玉伸ばし重視";
  }

  if (days <= 45) {
    return "✨ 仕上げ期<br>・潅水：やや抑える<br>・糖度向上";
  }

  return "🏁 収穫期<br>・潅水：最小<br>・収穫判断";
}

// 各ハウス
calcDays("date1", "result1", "schedule1", "house1");
calcDays("date2", "result2", "schedule2", "house2");
calcDays("date3", "result3", "schedule3", "house3");

</script>

</body>
</html>
